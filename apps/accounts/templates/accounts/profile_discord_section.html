<!-- Discord Account Section -->
<div class="profile-section" style="margin-top: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px;">
    <h3 style="margin-top: 0; color: #333;">Discord Account</h3>

    {% if user.discord_id and user.discord_verified %}
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            {% if user.discord_avatar %}
                <img src="https://cdn.discordapp.com/avatars/{{ user.discord_id }}/{{ user.discord_avatar }}.png" 
                     alt="Discord Avatar" 
                     style="width: 48px; height: 48px; border-radius: 50%;">
            {% else %}
                <div style="width: 48px; height: 48px; border-radius: 50%; background: #5865F2; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                    {{ user.discord_username|slice:":1"|upper }}
                </div>
            {% endif %}
            <div>
                <p style="margin: 0; font-weight: bold; color: #333;">{{ user.discord_username }}</p>
                <p style="margin: 0; font-size: 12px; color: #666;">Connected ✓</p>
            </div>
        </div>

        <form method="post" action="{% url 'discord_disconnect' %}" style="display: inline;">
            {% csrf_token %}
            <button type="submit" style="padding: 8px 16px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">
                Disconnect Discord
            </button>
        </form>
    {% else %}
        <p style="color: #666; margin-bottom: 15px;">
            Status: <span style="color: #dc3545; font-weight: bold;">Not Connected</span>
        </p>
        <a href="{% url 'discord_connect' %}" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #5865F2; color: white; text-decoration: none; border-radius: 6px; font-weight: bold;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Connect Discord
        </a>
    {% endif %}
</div>
