{% extends "base.html" %}

{% block title %}Notifications - {% endblock %}

{% block page_title %}Notifications{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Your Notifications</h5>
                    <button id="mark-all-read" class="btn btn-sm btn-outline-primary">Mark All as Read</button>
                </div>
                <div class="card-body" id="notifications-container">
                    <div class="text-center py-5">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadNotifications();
    document.getElementById('mark-all-read').addEventListener('click', markAllAsRead);
});

async function loadNotifications() {
    try {
        const response = await fetch('/api/notifications/');
        if (!response.ok) throw new Error('Failed to load notifications');
        const data = await response.json();
        renderNotifications(data.results || []);
    } catch (error) {
        document.getElementById('notifications-container').innerHTML = 
            '<div class="alert alert-danger">Failed to load notifications</div>';
    }
}

function renderNotifications(notifications) {
    const container = document.getElementById('notifications-container');
    if (notifications.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">No notifications</div>';
        return;
    }
    container.innerHTML = notifications.map(n => `
        <div class="notification-item ${n.is_read ? 'read' : 'unread'} mb-3 p-3 border-bottom" data-id="${n.id}">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="mb-1">${n.title}</h6>
                    <p class="mb-1 text-muted">${n.message}</p>
                    <small class="text-muted">${new Date(n.created_at).toLocaleString()}</small>
                </div>
                ${!n.is_read ? `<button class="btn btn-sm btn-outline-secondary mark-read" onclick="markAsRead('${n.id}')">Mark as read</button>` : ''}
            </div>
        </div>
    `).join('');
}

async function markAsRead(notificationId) {
    try {
        const response = await fetch(`/api/notifications/${notificationId}/read/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json'
            }
        });
        if (response.ok) {
            loadNotifications();
            updateUnreadCount();
        }
    } catch (error) {
        console.error('Failed to mark as read:', error);
    }
}

async function markAllAsRead() {
    try {
        const response = await fetch('/api/notifications/read-all/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json'
            }
        });
        if (response.ok) {
            loadNotifications();
            updateUnreadCount();
        }
    } catch (error) {
        console.error('Failed to mark all as read:', error);
    }
}

function updateUnreadCount() {
    fetch('/api/notifications/unread-count/')
        .then(r => r.json())
        .then(data => {
            const badge = document.querySelector('.badge.bg-danger');
            if (badge) {
                if (data.unread_count > 0) {
                    badge.textContent = data.unread_count;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            }
        });
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>

<style>
.notification-item.unread {
    background-color: #f8f9ff;
}
.notification-item.read {
    opacity: 0.7;
}
</style>
{% endblock %}
